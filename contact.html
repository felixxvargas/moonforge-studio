<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Moonforge Studio</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="image/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="image/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="image/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .contact-info h1 { filter: drop-shadow(0 0 36px rgba(137,254,155,0.16)); }
  </style>
</head>
<body class="page">

  <!-- FIXED PAGE BACKGROUND -->
  <div class="page-bg" aria-hidden="true">
    <div class="glow glow-green" style="top:5%; left:-100px; width:560px; height:560px; opacity:0.25;"></div>
    <div class="glow glow-peach" style="top:35%; right:-80px; width:460px; height:460px; opacity:0.2;"></div>
    <div class="page-bg-fade"></div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="9" cy="11" r="8" fill="#0c0e0b"/>
              <circle cx="13" cy="8" r="6" fill="#89FE9B"/>
            </svg>
          </div>
        Moonforge
      </a>
      <a href="contact.html" class="btn-contact">Contact</a>
    </div>
  </header>


  <!-- MAIN CONTENT -->
  <main class="contact-main" style="flex:1;">

    <!-- Left: info -->
    <div class="contact-info">
      <h1>Get In Touch</h1>
      <p>Ready to forge ahead into the future? Reach out to discuss your next project or collaboration.</p>
      <div class="contact-email-block">
        <span class="contact-email-label">Email Us</span>
        <a href="mailto:admin@moonforge.app" class="contact-email-link">admin@moonforge.app</a>
      </div>
    </div>

    <!-- Right: form -->
    <div class="contact-form-card">
      <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" novalidate>

        <input type="hidden" name="_replyto" id="replyto-field" />
        <input type="hidden" name="_subject" value="New message from moonforge.app" />

        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input
            class="form-input"
            type="text"
            id="name"
            name="name"
            placeholder="John Doe"
            required
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="john@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="message">Message</label>
          <textarea
            class="form-textarea"
            id="message"
            name="message"
            placeholder="Tell us about your project..."
            required
          ></textarea>
        </div>

        <button type="submit" class="btn-submit">Send Message</button>

      </form>
    </div>

  </main>

  <!-- FOOTER -->
  <footer style="position:relative; z-index:1;">
    <div class="footer-inner">
      <div class="footer-top">
        <a href="index.html" class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="9" cy="11" r="8" fill="#0c0e0b"/>
              <circle cx="13" cy="8" r="6" fill="#89FE9B"/>
            </svg>
          </div>
          Moonforge
        </a>
        <span class="footer-copy">© 2026 Moonforge. Digital Luminance.</span>
      </div>
      <div class="footer-links">
        <a href="index.html">Projects</a>
        <a href="team.html">Team</a>
        <a href="contact.html" class="active">Contact</a>
        <a href="#">Privacy</a>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast">Message sent! We'll be in touch.</div>

  <script src="script.js"></script>
</body>
</html>
